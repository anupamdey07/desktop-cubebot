model_list:
  # Provider 1: Local Ollama (Primary - Jetson First)
  - model_name: ollama-local
    litellm_params:
      model: ollama/qwen2.5:3b
      api_base: http://ollama:11434

  # Provider 2: Groq (Ultra-Fast Hardware Fallback)
  - model_name: groq
    litellm_params:
      model: groq/llama-3.1-8b-instant
      api_base: "https://api.groq.com/openai/v1"
      api_key: os.environ/GROQ_API_KEY

  # Provider 3: Moonshot Kimi (Deep Context Wisdom Fallback)
  - model_name: kimi
    litellm_params:
      model: moonshot/kimi-k2.5
      api_base: "https://api.moonshot.cn/v1"
      api_key: os.environ/MOONSHOT_API_KEY

# Intelligent Fallback Routing
# If the local Jetson model is overloaded or fails, route to Groq, then Kimi.
router_settings:
  routing_strategy: usage-based-routing
  fallbacks:
    - {"ollama-local": ["groq", "kimi"]}

general_settings:
  # The frontend will authenticate here via HTTP Bearer token
  master_key: "os.environ/LITELLM_MASTER_KEY"
