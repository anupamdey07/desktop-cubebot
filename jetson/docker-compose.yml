services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    networks:
      - ai-network

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm-router
    restart: always
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-router/config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000", "--host", "0.0.0.0"]
    environment:
      - LITELLM_MASTER_KEY=sk-jetson-master-key-1234
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
    networks:
      - ai-network

  whisper:
    image: dustynv/faster-whisper:r36.2.0
    container_name: whisper-server
    restart: always
    ports:
      - "8082:8000"
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    # faster-whisper automatically starts its server on port 8000 inside the container

    networks:
      - ai-network

networks:
  ai-network:
    driver: bridge

volumes:
  ollama-data:
